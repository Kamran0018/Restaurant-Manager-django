{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card animate-fade-up">
            <div class="text-center mb-4">
                <div class="mb-3">
                    <i class="bi bi-shield-lock text-gradient" style="font-size: 3rem;"></i>
                </div>
                <h2 class="mb-1" style="font-family: var(--font-display);">Reset <span class="text-gradient">Password</span></h2>
                <p class="text-muted">Enter your email to receive a reset link</p>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter your email address" required>
                </div>

                <button type="submit" class="btn btn-gradient-primary w-100 py-2 mb-3">
                    <i class="bi bi-send me-2"></i>Send Reset Link
                </button>

                <p class="text-center text-muted mb-0">
                    Remember your password?
                    <a href="{% url 'accounts:login' %}" style="color: var(--primary); text-decoration: none; font-weight: 600;">
                        Sign In
                    </a>
                </p>
            </form>
        </div>
    </div>
</section>
{% endblock %}
